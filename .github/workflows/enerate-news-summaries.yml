name: Generate News Summaries

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate summaries
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python scripts/generate_news_summaries.py

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- news/news-summaries.json; then
            echo "No changes in summaries."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add news/news-summaries.json
          git commit -m "chore: update news summaries [skip ci]"
          git push
